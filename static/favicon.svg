<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<!-- HUSBYGGET favicon — nocklyft + dörr, inget fönster, ingen måttlinje.
	     Samma ritningsblå som logo.svg (stora varianten med rutnät + måttlinje). -->
	<rect width="64" height="64" rx="14" fill="#17549c"/>
	<!-- tak, på väg ner -->
	<path d="M 15 21 L 32 7 L 49 21" fill="none" stroke="#fdfdfb" stroke-width="5"
		stroke-linecap="butt" stroke-linejoin="round"/>
	<!-- väggar + grund -->
	<path d="M 17 29 L 17 47 L 47 47 L 47 29" fill="none" stroke="#fdfdfb" stroke-width="5"
		stroke-linecap="butt" stroke-linejoin="round"/>
	<!-- dörr -->
	<rect x="28" y="37" width="8" height="10" rx="1.5" fill="#fdfdfb"/>
</svg>
