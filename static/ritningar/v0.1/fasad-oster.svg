<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 297" font-family="Arial, Helvetica, sans-serif">
	<rect width="420" height="297" fill="#ffffff"/>
	<rect x="10" y="10" width="400" height="277" fill="none" stroke="#000" stroke-width="0.35"/>
	<text x="20" y="22" font-size="5" font-weight="bold">FASAD MOT ÖSTER (entréfasad)</text>
	<text x="20" y="28" font-size="3" fill="#666">SKISS V2 — EJ BYGGLOVSHANDLING · 1,5-plan, garaget i samma kropp · spegelvänd: norr åt VÄNSTER som på planerna · skala 1:100 (A3)</text>
	<text x="405" y="285" font-size="2.5" text-anchor="end">Husbygget · 2026-07-18 · skiss av Claude</text>

	<!-- ==== GEOMETRI: 1 m = 10 mm. Spegelvänd mot verklig projektion: NORR åt vänster (matchar planernas orientering). Mark y=210. ==== -->
	<g transform="translate(75,0)">
		<!-- Marklinjer -->
		<line x1="-20" y1="210" x2="250" y2="210" stroke="#000" stroke-width="0.8"/>
		<line x1="-20" y1="212" x2="250" y2="212" stroke="#000" stroke-width="0.35" stroke-dasharray="3 2"/>

		<!-- EN SAMMANHÅLLEN KROPP 19,0 m (garaget = förlängning, samma takfot/nock):
		     x 0..190 (samma koordinater som planen: garage 0..50) · takfot 4,4 (y166) · nock 7,6 (y134) · taklutning 38° -->
		<rect x="0" y="166" width="190" height="44" fill="none" stroke="#000" stroke-width="0.5"/>
		<line x1="-3" y1="166" x2="193" y2="166" stroke="#000" stroke-width="0.5"/>
		<line x1="5" y1="134" x2="185" y2="134" stroke="#000" stroke-width="0.35"/>
		<line x1="-3" y1="166" x2="5" y2="134" stroke="#000" stroke-width="0.35"/>
		<line x1="193" y1="166" x2="185" y2="134" stroke="#000" stroke-width="0.35"/>

		<!-- Takfönster (dash-dot på takfallet) -->
		<g stroke="#000" stroke-width="0.35" stroke-dasharray="3 1.5 0.8 1.5" fill="none">
			<rect x="86" y="146" width="10" height="12"/>
			<rect x="126" y="146" width="10" height="12"/>
		</g>

		<!-- Entrédörr + skärmtak (samma x som på planen: entrén x 110..135) -->
		<rect x="116" y="189" width="12" height="21" fill="none" stroke="#000" stroke-width="0.35"/>
		<line x1="113" y1="187" x2="131" y2="187" stroke="#000" stroke-width="0.8"/>

		<!-- Fönster bv (norr åt vänster: garage/tvätt vänster, vardagsrum höger om entrén) -->
		<rect x="54" y="188" width="10" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="72" y="188" width="12" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="94" y="188" width="12" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="142" y="186" width="12" height="16" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="162" y="186" width="16" height="16" fill="none" stroke="#000" stroke-width="0.35"/>
		<line x1="170" y1="186" x2="170" y2="202" stroke="#000" stroke-width="0.18"/>
		<!-- Garagedelens fönster (bv + lägenhetens i väggliv) -->
		<rect x="10" y="188" width="10" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="30" y="188" width="10" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="20" y="170" width="10" height="9" fill="none" stroke="#000" stroke-width="0.35"/>

		<!-- UTERUM på SÖDRA gaveln (höger): 3,6 m djupt, balkong med räcke ovanpå -->
		<rect x="190" y="183" width="36" height="27" fill="none" stroke="#000" stroke-width="0.5"/>
		<g stroke="#000" stroke-width="0.18">
			<line x1="202" y1="183" x2="202" y2="210"/><line x1="214" y1="183" x2="214" y2="210"/>
			<line x1="190" y1="196" x2="226" y2="196"/>
		</g>
		<line x1="188" y1="183" x2="228" y2="183" stroke="#000" stroke-width="0.8"/>
		<g stroke="#000" stroke-width="0.25">
			<line x1="190" y1="172" x2="226" y2="172" stroke-width="0.5"/>
			<line x1="192" y1="172" x2="192" y2="183"/><line x1="197" y1="172" x2="197" y2="183"/><line x1="202" y1="172" x2="202" y2="183"/>
			<line x1="207" y1="172" x2="207" y2="183"/><line x1="212" y1="172" x2="212" y2="183"/><line x1="217" y1="172" x2="217" y2="183"/>
			<line x1="222" y1="172" x2="222" y2="183"/>
		</g>
		<text x="208" y="216" font-size="2.2" text-anchor="middle" fill="#444">uterum · balkong ovanpå (söder)</text>

		<!-- Höjdmått -->
		<g font-size="2.8" stroke-width="0.13">
			<line x1="240" y1="134" x2="240" y2="210" stroke="#000"/>
			<line x1="238" y1="134" x2="242" y2="134" stroke="#000"/>
			<line x1="238" y1="166" x2="242" y2="166" stroke="#000"/>
			<line x1="238" y1="210" x2="242" y2="210" stroke="#000"/>
			<text x="244" y="135" font-size="2.8">nock +7,6</text>
			<text x="244" y="167" font-size="2.8">takfot +4,4</text>
			<text x="244" y="209" font-size="2.8">mark ±0</text>
			<text x="115" y="222" font-size="2.5" fill="#444" text-anchor="middle">taklutning 38° · 1,5-plan · garaget i norra änden (vänster) · material/kulör TBD</text>
		</g>
	</g>

	<!-- Skalstock 1:100 -->
	<g transform="translate(20,278)">
		<rect x="0" y="0" width="10" height="2" fill="#000"/><rect x="10" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="20" y="0" width="10" height="2" fill="#000"/><rect x="30" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="40" y="0" width="10" height="2" fill="#000"/>
		<text x="0" y="-1.2" font-size="2.5" text-anchor="middle">0</text><text x="50" y="-1.2" font-size="2.5" text-anchor="middle">5 m</text>
	</g>
</svg>
