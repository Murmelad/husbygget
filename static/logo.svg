<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<!-- HUSBYGGET — byggritning icon. Drafting-blue tile; house outline in paper white:
	     solid = byggt, dashed = planerat. Lit door = hem. -->
	<rect width="64" height="64" rx="14" fill="#1f639e"/>
	<!-- solid: grund + vänster vägg + vänster takfall — skarpa ändar, mjuka hörn -->
	<path d="M 47 46 L 17 46 L 17 28 L 32 13"
		fill="none" stroke="#fdfdfb" stroke-width="5"
		stroke-linecap="butt" stroke-linejoin="round"/>
	<!-- dashed: höger vägg (det som ännu ritas) — tunnare än det byggda,
	     indragen nertill så inget streck nuddar den solida grunden -->
	<path d="M 47 28 L 47 41"
		fill="none" stroke="#fdfdfb" stroke-width="0.85"
		stroke-linecap="butt"
		stroke-dasharray="1.8 3.8"/>
	<!-- planerat gavelfönster — streckat likt den oritade halvan -->
	<rect x="30" y="22" width="6" height="6" fill="none"
		stroke="#fdfdfb" stroke-width="0.85" stroke-dasharray="2 1"/>
	<!-- dörr (dörr + fönster är centrerade mellan väggarnas INNERkanter,
	     inte mot nocken — den tjocka väggen äter mer av interiören) -->
	<rect x="29" y="35" width="8" height="11" rx="1.5" fill="#fdfdfb"/>
</svg>
