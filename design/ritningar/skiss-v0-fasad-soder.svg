<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 297" font-family="Arial, Helvetica, sans-serif">
	<rect width="420" height="297" fill="#ffffff"/>
	<rect x="10" y="10" width="400" height="277" fill="none" stroke="#000" stroke-width="0.35"/>
	<text x="20" y="22" font-size="5" font-weight="bold">FASAD MOT SÖDER (entréfasad)</text>
	<text x="20" y="28" font-size="3" fill="#666">SKISS V0 — EJ BYGGLOVSHANDLING · Skanör-inspirerad · skala 1:100 (A3)</text>
	<text x="405" y="285" font-size="2.5" text-anchor="end">Husbygget · 2026-07-18 · skiss av Claude</text>

	<!-- ==== GEOMETRI: 1 m = 10 mm. Marklinje y=210. ==== -->
	<g transform="translate(60,0)">
		<!-- Marklinje (ny = heldragen; befintlig streckad strax under, skiss) -->
		<line x1="-15" y1="210" x2="240" y2="210" stroke="#000" stroke-width="0.8"/>
		<line x1="-15" y1="212" x2="240" y2="212" stroke="#000" stroke-width="0.35" stroke-dasharray="3 2"/>

		<!-- HUVUDKROPP x 72..192: vägg till takfot 5,7 m (y 153), nock 7,4 m (y 136) -->
		<rect x="72" y="153" width="120" height="57" fill="none" stroke="#000" stroke-width="0.5"/>
		<!-- takfot + nocklinje (nock öst-väst: fasaden visar takplanet som band) -->
		<line x1="69" y1="153" x2="195" y2="153" stroke="#000" stroke-width="0.5"/>
		<line x1="74" y1="136" x2="190" y2="136" stroke="#000" stroke-width="0.35"/>
		<line x1="69" y1="153" x2="74" y2="136" stroke="#000" stroke-width="0.35"/>
		<line x1="195" y1="153" x2="190" y2="136" stroke="#000" stroke-width="0.35"/>

		<!-- GARAGELÄNGA x 0..72: takfot 5,2 (y 158), nock 6,4 (y 146) -->
		<rect x="0" y="158" width="72" height="52" fill="none" stroke="#000" stroke-width="0.5"/>
		<line x1="-3" y1="158" x2="72" y2="158" stroke="#000" stroke-width="0.5"/>
		<line x1="2" y1="146" x2="69" y2="146" stroke="#000" stroke-width="0.35"/>
		<line x1="-3" y1="158" x2="2" y2="146" stroke="#000" stroke-width="0.35"/>

		<!-- Garageportar -->
		<rect x="8" y="185" width="25" height="25" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="39" y="185" width="25" height="25" fill="none" stroke="#000" stroke-width="0.35"/>
		<g stroke="#000" stroke-width="0.18">
			<line x1="8" y1="191" x2="33" y2="191"/><line x1="8" y1="197" x2="33" y2="197"/><line x1="8" y1="203" x2="33" y2="203"/>
			<line x1="39" y1="191" x2="64" y2="191"/><line x1="39" y1="197" x2="64" y2="197"/><line x1="39" y1="203" x2="64" y2="203"/>
		</g>
		<!-- Lägenhetens fönster (över garaget) -->
		<rect x="14" y="164" width="12" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="45" y="164" width="12" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<line x1="20" y1="164" x2="20" y2="176" stroke="#000" stroke-width="0.18"/>
		<line x1="51" y1="164" x2="51" y2="176" stroke="#000" stroke-width="0.18"/>

		<!-- Entrédörr + skärmtak x 116..128 -->
		<rect x="116" y="189" width="12" height="21" fill="none" stroke="#000" stroke-width="0.35"/>
		<line x1="113" y1="187" x2="131" y2="187" stroke="#000" stroke-width="0.8"/>
		<!-- Högt fönsterparti över entrén (Skanörs dubbelhöga entré) -->
		<rect x="117" y="158" width="10" height="26" fill="none" stroke="#000" stroke-width="0.35"/>
		<line x1="122" y1="158" x2="122" y2="184" stroke="#000" stroke-width="0.18"/>

		<!-- Fönster bv väster om entrén (klädvård) + vardagsrumsparti öster syns bakom uterum -->
		<rect x="80" y="188" width="10" height="12" fill="none" stroke="#000" stroke-width="0.35"/>

		<!-- UTERUM x 135..183, höjd 2,7 (y 183..210), platt tak = balkongbjälklag -->
		<rect x="135" y="183" width="48" height="27" fill="none" stroke="#000" stroke-width="0.5"/>
		<g stroke="#000" stroke-width="0.18">
			<line x1="147" y1="183" x2="147" y2="210"/><line x1="159" y1="183" x2="159" y2="210"/><line x1="171" y1="183" x2="171" y2="210"/>
			<line x1="135" y1="196" x2="183" y2="196"/>
		</g>
		<line x1="133" y1="183" x2="185" y2="183" stroke="#000" stroke-width="0.8"/>
		<!-- Balkongräcke 1,1 m (y 172..183) -->
		<g stroke="#000" stroke-width="0.25">
			<line x1="135" y1="172" x2="183" y2="172" stroke-width="0.5"/>
			<line x1="137" y1="172" x2="137" y2="183"/><line x1="142" y1="172" x2="142" y2="183"/><line x1="147" y1="172" x2="147" y2="183"/>
			<line x1="152" y1="172" x2="152" y2="183"/><line x1="157" y1="172" x2="157" y2="183"/><line x1="162" y1="172" x2="162" y2="183"/>
			<line x1="167" y1="172" x2="167" y2="183"/><line x1="172" y1="172" x2="172" y2="183"/><line x1="177" y1="172" x2="177" y2="183"/>
			<line x1="181" y1="172" x2="181" y2="183"/>
		</g>
		<!-- Skjutparti bakom balkongen (master) -->
		<rect x="142" y="160" width="35" height="23" fill="none" stroke="#000" stroke-width="0.35"/>
		<line x1="159.5" y1="160" x2="159.5" y2="183" stroke="#000" stroke-width="0.18"/>
		<text x="159" y="157.5" font-size="2.2" text-anchor="middle" fill="#444">skjutparti</text>

		<!-- Sovrumsfönster öster på övervåning utanför balkongen -->
		<rect x="97" y="162" width="10" height="12" fill="none" stroke="#000" stroke-width="0.35"/>

		<!-- Höjdmått -->
		<g font-size="2.8" stroke-width="0.13">
			<line x1="220" y1="136" x2="220" y2="210" stroke="#000"/>
			<line x1="218" y1="136" x2="222" y2="136" stroke="#000"/>
			<line x1="218" y1="153" x2="222" y2="153" stroke="#000"/>
			<line x1="218" y1="210" x2="222" y2="210" stroke="#000"/>
			<text x="224" y="137" font-size="2.8">nock +7,4</text>
			<text x="224" y="154" font-size="2.8">takfot +5,7</text>
			<text x="224" y="209" font-size="2.8">mark ±0</text>
			<text x="106" y="220" font-size="2.5" fill="#444">taklutning 27° · fasad: material/kulör TBD</text>
		</g>
	</g>

	<!-- Skalstock 1:100 -->
	<g transform="translate(20,278)">
		<rect x="0" y="0" width="10" height="2" fill="#000"/><rect x="10" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="20" y="0" width="10" height="2" fill="#000"/><rect x="30" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="40" y="0" width="10" height="2" fill="#000"/>
		<text x="0" y="-1.2" font-size="2.5" text-anchor="middle">0</text><text x="50" y="-1.2" font-size="2.5" text-anchor="middle">5 m</text>
	</g>
</svg>
