<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 297" font-family="Arial, Helvetica, sans-serif">
	<rect width="420" height="297" fill="#ffffff"/>
	<rect x="10" y="10" width="400" height="277" fill="none" stroke="#000" stroke-width="0.35"/>
	<text x="20" y="22" font-size="5" font-weight="bold">FASAD MOT NORR (garagegaveln)</text>
	<text x="20" y="28" font-size="3" fill="#666">SKISS V2 — EJ BYGGLOVSHANDLING · 1,5-plan, en sammanhållen kropp · skala 1:100 (A3)</text>
	<text x="405" y="285" font-size="2.5" text-anchor="end">Husbygget · 2026-07-18 · skiss av Claude</text>

	<!-- ==== GEOMETRI: 1 m = 10 mm. Sedd norrifrån: ÖSTER åt vänster. Mark y=210. ==== -->
	<g transform="translate(160,0)">
		<line x1="-25" y1="210" x2="115" y2="210" stroke="#000" stroke-width="0.8"/>
		<line x1="-25" y1="212" x2="115" y2="212" stroke="#000" stroke-width="0.35" stroke-dasharray="3 2"/>

		<!-- GAVEL 8,0 m bred: vägg till takfot 4,4 (y166), nocktriangel till 7,6 (y134), 38° -->
		<rect x="0" y="166" width="80" height="44" fill="none" stroke="#000" stroke-width="0.5"/>
		<path d="M -3 166 L 40 134 L 83 166" fill="none" stroke="#000" stroke-width="0.5"/>

		<!-- Garageportar 2 × 2,4 m -->
		<rect x="8" y="186" width="24" height="24" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="48" y="186" width="24" height="24" fill="none" stroke="#000" stroke-width="0.35"/>
		<g stroke="#000" stroke-width="0.18">
			<line x1="8" y1="192" x2="32" y2="192"/><line x1="8" y1="198" x2="32" y2="198"/><line x1="8" y1="204" x2="32" y2="204"/>
			<line x1="48" y1="192" x2="72" y2="192"/><line x1="48" y1="198" x2="72" y2="198"/><line x1="48" y1="204" x2="72" y2="204"/>
		</g>

		<!-- Lägenhetens gavelfönster (i nocktriangeln) -->
		<rect x="33" y="146" width="14" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<line x1="40" y1="146" x2="40" y2="158" stroke="#000" stroke-width="0.18"/>

		<!-- Höjdmått -->
		<g font-size="2.8" stroke-width="0.13">
			<line x1="95" y1="134" x2="95" y2="210" stroke="#000"/>
			<line x1="93" y1="134" x2="97" y2="134" stroke="#000"/>
			<line x1="93" y1="166" x2="97" y2="166" stroke="#000"/>
			<line x1="93" y1="210" x2="97" y2="210" stroke="#000"/>
			<text x="99" y="135" font-size="2.8">nock +7,6</text>
			<text x="99" y="167" font-size="2.8">takfot +4,4</text>
			<text x="99" y="209" font-size="2.8">mark ±0</text>
			<text x="40" y="220" font-size="2.5" fill="#444" text-anchor="middle">infart från norr · portar 2 × 2,4 m · öster till vänster i bilden</text>
		</g>
	</g>

	<!-- Skalstock 1:100 -->
	<g transform="translate(20,278)">
		<rect x="0" y="0" width="10" height="2" fill="#000"/><rect x="10" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="20" y="0" width="10" height="2" fill="#000"/><rect x="30" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="40" y="0" width="10" height="2" fill="#000"/>
		<text x="0" y="-1.2" font-size="2.5" text-anchor="middle">0</text><text x="50" y="-1.2" font-size="2.5" text-anchor="middle">5 m</text>
	</g>
</svg>
