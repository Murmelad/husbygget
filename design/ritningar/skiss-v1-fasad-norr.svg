<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 297" font-family="Arial, Helvetica, sans-serif">
	<rect width="420" height="297" fill="#ffffff"/>
	<rect x="10" y="10" width="400" height="277" fill="none" stroke="#000" stroke-width="0.35"/>
	<text x="20" y="22" font-size="5" font-weight="bold">FASAD MOT NORR (garagegaveln)</text>
	<text x="20" y="28" font-size="3" fill="#666">SKISS V1 — EJ BYGGLOVSHANDLING · Skanör-inspirerad · skala 1:100 (A3)</text>
	<text x="405" y="285" font-size="2.5" text-anchor="end">Husbygget · 2026-07-18 · skiss av Claude</text>

	<!-- ==== GEOMETRI: 1 m = 10 mm. Sedd norrifrån: ÖSTER till vänster. Marklinje y=210. ==== -->
	<g transform="translate(140,0)">
		<!-- Marklinje -->
		<line x1="-25" y1="210" x2="120" y2="210" stroke="#000" stroke-width="0.8"/>
		<line x1="-25" y1="212" x2="120" y2="212" stroke="#000" stroke-width="0.35" stroke-dasharray="3 2"/>

		<!-- HUVUDKROPPENS GAVEL bakom (9,0 bred): vägg till takfot 5,7 (y153), nock 7,4 (y136), sadeltak-triangel -->
		<rect x="0" y="153" width="90" height="57" fill="none" stroke="#000" stroke-width="0.5"/>
		<path d="M -2 153 L 45 136 L 92 153" fill="none" stroke="#000" stroke-width="0.5"/>

		<!-- GARAGELÄNGANS GAVEL framför (6,6 bred, indragen 1,5 m från öster): vägg till 5,2 (y158), nock 6,4 (y146) -->
		<rect x="9" y="158" width="66" height="52" fill="#ffffff" stroke="#000" stroke-width="0.5"/>
		<path d="M 7 158 L 42 146 L 77 158" fill="#ffffff" stroke="#000" stroke-width="0.5"/>

		<!-- Garageportar 2 × 2,5 m -->
		<rect x="14" y="185" width="25" height="25" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="45" y="185" width="25" height="25" fill="none" stroke="#000" stroke-width="0.35"/>
		<g stroke="#000" stroke-width="0.18">
			<line x1="14" y1="191" x2="39" y2="191"/><line x1="14" y1="197" x2="39" y2="197"/><line x1="14" y1="203" x2="39" y2="203"/>
			<line x1="45" y1="191" x2="70" y2="191"/><line x1="45" y1="197" x2="70" y2="197"/><line x1="45" y1="203" x2="70" y2="203"/>
		</g>

		<!-- Lägenhetens gavelfönster -->
		<rect x="36" y="164" width="12" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<line x1="42" y1="164" x2="42" y2="176" stroke="#000" stroke-width="0.18"/>

		<!-- Höjdmått -->
		<g font-size="2.8" stroke-width="0.13">
			<line x1="105" y1="136" x2="105" y2="210" stroke="#000"/>
			<line x1="103" y1="136" x2="107" y2="136" stroke="#000"/>
			<line x1="103" y1="146" x2="107" y2="146" stroke="#000"/>
			<line x1="103" y1="210" x2="107" y2="210" stroke="#000"/>
			<text x="109" y="137" font-size="2.8">nock huvudkropp +7,4</text>
			<text x="109" y="147" font-size="2.8">nock garagelänga +6,4</text>
			<text x="109" y="209" font-size="2.8">mark ±0</text>
			<text x="45" y="220" font-size="2.5" fill="#444" text-anchor="middle">infart från norr · öster till vänster i bilden</text>
		</g>
	</g>

	<!-- Skalstock 1:100 -->
	<g transform="translate(20,278)">
		<rect x="0" y="0" width="10" height="2" fill="#000"/><rect x="10" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="20" y="0" width="10" height="2" fill="#000"/><rect x="30" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="40" y="0" width="10" height="2" fill="#000"/>
		<text x="0" y="-1.2" font-size="2.5" text-anchor="middle">0</text><text x="50" y="-1.2" font-size="2.5" text-anchor="middle">5 m</text>
	</g>
</svg>
