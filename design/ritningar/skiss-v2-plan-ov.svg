<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 297" font-family="Arial, Helvetica, sans-serif">
	<rect width="420" height="297" fill="#ffffff"/>
	<rect x="10" y="10" width="400" height="277" fill="none" stroke="#000" stroke-width="0.35"/>
	<text x="20" y="22" font-size="5" font-weight="bold">PLAN — ÖVERVÅNING</text>
	<text x="20" y="28" font-size="3" fill="#666">SKISS V2 — EJ BYGGLOVSHANDLING · Skanör speglad + lägenhet över garaget · skala 1:100 (A3)</text>
	<text x="405" y="285" font-size="2.5" text-anchor="end">Husbygget · 2026-07-18 · skiss av Claude</text>

	<g transform="translate(395,35)">
		<circle r="7" fill="none" stroke="#000" stroke-width="0.25"/>
		<path d="M 5 0 L -5 0 M -5 0 L -1.5 -2 M -5 0 L -1.5 2" stroke="#000" stroke-width="0.5" fill="none"/>
		<text x="-9" y="1" text-anchor="end" font-size="3">N</text>
	</g>

	<!-- ==== GEOMETRI: 1 m = 10 mm. Norr = vänster. 1,5-plan: snedtak längs långsidorna. ==== -->
	<g transform="translate(75,65)">
		<!-- Snedtaksband (takytor utanför kniväggarna) -->
		<rect x="-6" y="-10" width="202" height="10" fill="#dcdcdc"/>
		<rect x="-6" y="80" width="202" height="10" fill="#dcdcdc"/>

		<!-- Ytterväggar: garage-delen (lägenhet) x 0..50 + huvudhus x 50..190 -->
		<rect x="0" y="0" width="190" height="80" fill="none" stroke="#000" stroke-width="4"/>
		<line x1="50" y1="0" x2="50" y2="80" stroke="#000" stroke-width="4"/>

		<!-- BALKONG (uterummets tak) på södra gaveln -->
		<rect x="190" y="16" width="36" height="48" fill="none" stroke="#000" stroke-width="0.8"/>
		<g stroke="#000" stroke-width="0.25">
			<line x1="190" y1="19" x2="226" y2="19"/><line x1="223" y1="16" x2="223" y2="64"/>
			<line x1="190" y1="61" x2="226" y2="61"/>
		</g>
		<text x="208" y="38" font-size="3" text-anchor="middle">BALKONG</text>
		<text x="208" y="42.5" font-size="2.5" text-anchor="middle" fill="#444">räcke 1,1 m · 17 m²</text>

		<!-- Innerväggar huvudhus (Skanör SPEGLAD: master/dress/bad åt söder) -->
		<g stroke="#000" stroke-width="1.2">
			<line x1="88" y1="0" x2="88" y2="80"/>          <!-- sovrumsblock | allrum -->
			<line x1="50" y1="32" x2="88" y2="32"/>         <!-- sovrum 2 | passage -->
			<line x1="50" y1="44" x2="88" y2="44"/>         <!-- passage | sovrum 3 -->
			<line x1="135" y1="0" x2="135" y2="80"/>        <!-- allrum | södra blocket -->
			<line x1="135" y1="26" x2="190" y2="26"/>       <!-- bad+dress | master -->
			<line x1="162" y1="0" x2="162" y2="26"/>        <!-- bad | dress -->
		</g>

		<!-- Trappa (nedre delen av allrum, som förlagan) -->
		<g stroke="#000" stroke-width="0.35">
			<rect x="113" y="54" width="10" height="26" fill="none"/>
			<line x1="113" y1="58" x2="123" y2="58"/><line x1="113" y1="62" x2="123" y2="62"/>
			<line x1="113" y1="66" x2="123" y2="66"/><line x1="113" y1="70" x2="123" y2="70"/>
			<line x1="113" y1="74" x2="123" y2="74"/>
		</g>

		<!-- Takfönster (markering som i förlagan) -->
		<g stroke="#000" stroke-width="0.35" stroke-dasharray="3 1.5 0.8 1.5" fill="none">
			<rect x="143" y="2" width="12" height="8"/>
			<rect x="103" y="2" width="12" height="8"/>
		</g>
		<text x="149" y="-2.5" font-size="2.2" text-anchor="middle" fill="#444">takfönster</text>
		<text x="109" y="-2.5" font-size="2.2" text-anchor="middle" fill="#444">takfönster</text>

		<!-- Skjutparti master → balkong (södra gaveln) -->
		<rect x="188" y="40" width="4" height="32" fill="#fff"/>
		<g stroke="#000" stroke-width="0.8">
			<line x1="189" y1="40" x2="189" y2="57"/>
			<line x1="191" y1="55" x2="191" y2="72"/>
		</g>
		<text x="186" y="37" font-size="2.2" text-anchor="end" fill="#444">skjutparti 3,2 m</text>

		<!-- Dörrar: sovrum + passage + lägenhet -->
		<g>
			<rect x="86" y="12" width="4" height="9" fill="#fff"/>
			<rect x="86" y="56" width="4" height="9" fill="#fff"/>
			<rect x="86" y="33" width="4" height="10" fill="#fff"/>
			<rect x="48" y="33" width="4" height="10" fill="#fff"/>
			<rect x="133" y="50" width="4" height="10" fill="#fff"/>
			<rect x="150" y="24" width="9" height="4" fill="#fff"/>
			<rect x="167" y="24" width="9" height="4" fill="#fff"/>
		</g>
		<text x="69" y="41" font-size="2.5" text-anchor="middle" fill="#444">PASSAGE →</text>

		<!-- Lägenheten (över garaget): öppen studio + separat bad -->
		<g stroke="#000" stroke-width="1.2">
			<line x1="30" y1="0" x2="30" y2="24"/>
			<line x1="30" y1="24" x2="50" y2="24"/>
		</g>
		<g font-size="3">
			<text x="25" y="50" text-anchor="middle">SOVRUM / ALLRUM</text>
			<text x="25" y="54.5" text-anchor="middle">+ PENTRY</text>
			<text x="25" y="59" text-anchor="middle" font-size="2.5" fill="#444">lägenhet, öppen studio · ~26 m²</text>
			<text x="40" y="13" text-anchor="middle" font-size="2.8">BAD/WC</text>
		</g>
		<rect x="38" y="22" width="9" height="4" fill="#fff"/>

		<!-- Rumsnamn huvudhus -->
		<g font-size="3">
			<text x="69" y="15" text-anchor="middle">SOVRUM 2</text><text x="69" y="19.5" text-anchor="middle" font-size="2.5" fill="#444">~12 m² inkl. klk</text>
			<text x="69" y="60" text-anchor="middle">SOVRUM 3</text><text x="69" y="64.5" text-anchor="middle" font-size="2.5" fill="#444">~13 m² inkl. klk</text>
			<text x="111" y="30" text-anchor="middle">ALLRUM</text><text x="111" y="34.5" text-anchor="middle" font-size="2.5" fill="#444">20,5 m²</text>
			<text x="148" y="15" text-anchor="middle">BAD</text><text x="148" y="19.5" text-anchor="middle" font-size="2.5" fill="#444">6,6 m² · badkar</text>
			<text x="176" y="15" text-anchor="middle">DRESS</text><text x="176" y="19.5" text-anchor="middle" font-size="2.5" fill="#444">4,4 m²</text>
			<text x="162" y="50" text-anchor="middle">MASTER BEDROOM</text><text x="162" y="54.5" text-anchor="middle" font-size="2.5" fill="#444">14,4 m² · skjutdörrar mot balkong i söder</text>
		</g>

		<!-- Snitt A–A -->
		<g stroke="#000" stroke-width="0.8">
			<line x1="119" y1="-16" x2="119" y2="-11" stroke-dasharray="4 1.5 1 1.5"/>
			<line x1="119" y1="91" x2="119" y2="96" stroke-dasharray="4 1.5 1 1.5"/>
			<circle cx="119" cy="-19" r="3" fill="none" stroke-width="0.35"/>
			<circle cx="119" cy="99" r="3" fill="none" stroke-width="0.35"/>
			<text x="119" y="-17.9" font-size="3" text-anchor="middle">A</text>
			<text x="119" y="100.1" font-size="3" text-anchor="middle">A</text>
		</g>
	</g>

	<!-- Skalstock 1:100 -->
	<g transform="translate(20,278)">
		<rect x="0" y="0" width="10" height="2" fill="#000"/><rect x="10" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="20" y="0" width="10" height="2" fill="#000"/><rect x="30" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="40" y="0" width="10" height="2" fill="#000"/>
		<text x="0" y="-1.2" font-size="2.5" text-anchor="middle">0</text><text x="50" y="-1.2" font-size="2.5" text-anchor="middle">5 m</text>
	</g>
</svg>
