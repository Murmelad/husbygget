<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 297" font-family="Arial, Helvetica, sans-serif">
	<rect width="420" height="297" fill="#ffffff"/>
	<rect x="10" y="10" width="400" height="277" fill="none" stroke="#000" stroke-width="0.35"/>
	<text x="20" y="22" font-size="5" font-weight="bold">PLAN — BOTTENVÅNING</text>
	<text x="20" y="28" font-size="3" fill="#666">SKISS V2 — EJ BYGGLOVSHANDLING · Skanör (Fiskarhedenvillan) + garageförlängning 5,0 m · skala 1:100 (A3)</text>
	<text x="405" y="285" font-size="2.5" text-anchor="end">Husbygget · 2026-07-18 · skiss av Claude</text>

	<!-- Norrpil: norr åt vänster -->
	<g transform="translate(395,35)">
		<circle r="7" fill="none" stroke="#000" stroke-width="0.25"/>
		<path d="M 5 0 L -5 0 M -5 0 L -1.5 -2 M -5 0 L -1.5 2" stroke="#000" stroke-width="0.5" fill="none"/>
		<text x="-9" y="1" text-anchor="end" font-size="3">N</text>
	</g>

	<!-- ==== GEOMETRI: 1 m = 10 mm. Norr = vänster, entré (öster) = nederkant. ==== -->
	<g transform="translate(75,65)">
		<!-- GARAGE (förlängning av huvudkroppen): x 0..50 · huvudhus x 50..190 · totalt 19,0 × 8,0 utv -->
		<rect x="0" y="0" width="190" height="80" fill="none" stroke="#000" stroke-width="4"/>
		<line x1="50" y1="0" x2="50" y2="80" stroke="#000" stroke-width="4"/>

		<!-- UTERUM på södra gaveln 3,6 × 4,8, balkong ovanpå: x 190..226, y 16..64 -->
		<rect x="190" y="16" width="36" height="48" fill="none" stroke="#000" stroke-width="0.8"/>
		<rect x="191.5" y="17.5" width="33" height="45" fill="none" stroke="#000" stroke-width="0.35"/>
		<text x="208" y="38" font-size="3" text-anchor="middle">UTERUM</text>
		<text x="208" y="42.5" font-size="2.5" text-anchor="middle" fill="#444">17 m² · balkong ovanpå</text>

		<!-- Innerväggar (efter riktiga Skanör-planen) -->
		<g stroke="#000" stroke-width="1.2">
			<line x1="83" y1="0" x2="83" y2="30"/>          <!-- tvätt | kök -->
			<line x1="50" y1="30" x2="135" y2="30"/>        <!-- övre raden | nedre -->
			<line x1="85" y1="30" x2="85" y2="80"/>         <!-- arbetsrum | hall/wc -->
			<line x1="85" y1="45" x2="110" y2="45"/>        <!-- hall | wc -->
			<line x1="110" y1="30" x2="110" y2="80"/>       <!-- wc/hall | entré -->
			<line x1="135" y1="0" x2="135" y2="30"/>        <!-- kök | vardagsrum (öppet nedtill) -->
		</g>
		<!-- öppen övergång kök/vardagsrum ↔ entré (streckad zon som i förlagan) -->
		<line x1="135" y1="30" x2="190" y2="30" stroke="#000" stroke-width="0.25" stroke-dasharray="2 1.5"/>

		<!-- Trappa i entrén (svängd, som förlagan) -->
		<g stroke="#000" stroke-width="0.35">
			<rect x="113" y="33" width="10" height="26" fill="none"/>
			<line x1="113" y1="37" x2="123" y2="37"/><line x1="113" y1="41" x2="123" y2="41"/>
			<line x1="113" y1="45" x2="123" y2="45"/><line x1="113" y1="49" x2="123" y2="49"/>
			<line x1="113" y1="53" x2="123" y2="53"/>
			<path d="M 118 57 L 118 36 M 118 36 L 116.5 39 M 118 36 L 119.5 39" stroke-width="0.25"/>
		</g>

		<!-- Öppningar -->
		<g>
			<!-- entrédörr öster (nederkant) -->
			<rect x="116" y="78" width="12" height="4" fill="#fff"/>
			<path d="M 116 80 A 12 12 0 0 1 128 68" fill="none" stroke="#000" stroke-width="0.25"/>
			<line x1="116" y1="80" x2="116" y2="68" stroke="#000" stroke-width="0.5"/>
			<!-- dörr tvätt → garage (Skanörs dörr i vänstra väggen = norra) -->
			<rect x="48" y="8" width="4" height="9" fill="#fff"/>
			<text x="56" y="10" font-size="2.2" fill="#444">dörr garage↔tvätt</text>
			<!-- dörr vardagsrum → uterum (södra gaveln) -->
			<rect x="188" y="32" width="4" height="10" fill="#fff"/>
			<!-- garageportar NORRA gaveln -->
			<rect x="-2" y="8" width="4" height="24" fill="#fff"/>
			<rect x="-2" y="46" width="4" height="24" fill="#fff"/>
			<line x1="0" y1="8" x2="0" y2="32" stroke="#000" stroke-width="0.8" stroke-dasharray="3 1.5"/>
			<line x1="0" y1="46" x2="0" y2="70" stroke="#000" stroke-width="0.8" stroke-dasharray="3 1.5"/>
			<text x="-4" y="40" font-size="2.2" text-anchor="end" fill="#444">portar</text>
		</g>

		<!-- Rumsnamn (riktiga Skanör-ytor) -->
		<g font-size="3">
			<text x="25" y="38" text-anchor="middle">GARAGE</text><text x="25" y="42.5" text-anchor="middle" font-size="2.5" fill="#444">2 bilar · ~33 m²</text>
			<text x="66" y="14" text-anchor="middle">TVÄTT</text><text x="66" y="18.5" text-anchor="middle" font-size="2.5" fill="#444">9,1 m² · BVP</text>
			<text x="109" y="14" text-anchor="middle">KÖK</text><text x="109" y="18.5" text-anchor="middle" font-size="2.5" fill="#444">20,3 m²</text>
			<text x="162" y="40" text-anchor="middle">VARDAGSRUM</text><text x="162" y="44.5" text-anchor="middle" font-size="2.5" fill="#444">34,9 m²</text>
			<text x="67" y="60" text-anchor="middle">ARBETSRUM</text><text x="67" y="64.5" text-anchor="middle" font-size="2.5" fill="#444">8,4 m²</text>
			<text x="97" y="39" text-anchor="middle" font-size="2.5">HALL 2,7</text>
			<text x="97" y="62" text-anchor="middle">WC/D</text><text x="97" y="66.5" text-anchor="middle" font-size="2.5" fill="#444">4,7 m²</text>
			<text x="128" y="66" text-anchor="middle">ENTRÉ</text><text x="128" y="70.5" text-anchor="middle" font-size="2.5" fill="#444">12,4 m²</text>
		</g>

		<!-- Snitt A–A genom entré/trappa -->
		<g stroke="#000" stroke-width="0.8">
			<line x1="119" y1="-8" x2="119" y2="-2" stroke-dasharray="4 1.5 1 1.5"/>
			<line x1="119" y1="82" x2="119" y2="88" stroke-dasharray="4 1.5 1 1.5"/>
			<circle cx="119" cy="-11" r="3" fill="none" stroke-width="0.35"/>
			<circle cx="119" cy="91" r="3" fill="none" stroke-width="0.35"/>
			<text x="119" y="-9.9" font-size="3" text-anchor="middle">A</text>
			<text x="119" y="92.1" font-size="3" text-anchor="middle">A</text>
		</g>

		<!-- Huvudmått -->
		<g font-size="2.8" stroke-width="0.13">
			<line x1="0" y1="112" x2="226" y2="112" stroke="#000"/>
			<line x1="0" y1="110" x2="0" y2="114" stroke="#000"/><line x1="50" y1="110" x2="50" y2="114" stroke="#000"/><line x1="190" y1="110" x2="190" y2="114" stroke="#000"/><line x1="226" y1="110" x2="226" y2="114" stroke="#000"/>
			<text x="25" y="110.8" text-anchor="middle">5,0</text>
			<text x="120" y="110.8" text-anchor="middle">14,0</text>
			<text x="208" y="110.8" text-anchor="middle">3,6</text>
			<line x1="236" y1="0" x2="236" y2="80" stroke="#000"/>
			<line x1="234" y1="0" x2="238" y2="0" stroke="#000"/><line x1="234" y1="80" x2="238" y2="80" stroke="#000"/>
			<text x="239" y="41" font-size="2.8">8,0</text>
		</g>
	</g>

	<!-- Skalstock 1:100 -->
	<g transform="translate(20,278)">
		<rect x="0" y="0" width="10" height="2" fill="#000"/><rect x="10" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="20" y="0" width="10" height="2" fill="#000"/><rect x="30" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="40" y="0" width="10" height="2" fill="#000"/>
		<text x="0" y="-1.2" font-size="2.5" text-anchor="middle">0</text><text x="50" y="-1.2" font-size="2.5" text-anchor="middle">5 m</text>
	</g>
</svg>
