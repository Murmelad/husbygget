<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 297" font-family="Arial, Helvetica, sans-serif">
	<rect width="420" height="297" fill="#ffffff"/>
	<rect x="10" y="10" width="400" height="277" fill="none" stroke="#000" stroke-width="0.35"/>
	<text x="20" y="22" font-size="5" font-weight="bold">PLAN — BOTTENVÅNING</text>
	<text x="20" y="28" font-size="3" fill="#666">SKISS V0 — EJ BYGGLOVSHANDLING · Skanör-inspirerad · skala 1:100 (A3)</text>
	<text x="405" y="285" font-size="2.5" text-anchor="end">Husbygget · 2026-07-18 · skiss av Claude</text>

	<!-- NORR upp -->
	<g transform="translate(395,35)">
		<circle r="7" fill="none" stroke="#000" stroke-width="0.25"/>
		<path d="M 0 5 L 0 -5 M 0 -5 L -2 -1.5 M 0 -5 L 2 -1.5" stroke="#000" stroke-width="0.5" fill="none"/>
		<text y="-9.5" text-anchor="middle" font-size="3">N</text>
	</g>

	<!-- ==== GEOMETRI: 1 m = 10 mm. Norr = upp. ==== -->
	<g transform="translate(60,45)">
		<!-- Huvudkropp 12,0 × 9,0: x 72..192, y 0..90 -->
		<rect x="72" y="0" width="120" height="90" fill="none" stroke="#000" stroke-width="4"/>
		<!-- Garagelänga 7,2 × 6,6: x 0..72, y 15..81 -->
		<rect x="0" y="15" width="72" height="66" fill="none" stroke="#000" stroke-width="4"/>
		<!-- Uterum 4,8 × 3,6 (glasväggar): x 135..183, y 90..126 -->
		<rect x="135" y="90" width="48" height="36" fill="none" stroke="#000" stroke-width="0.8"/>
		<rect x="136.5" y="91.5" width="45" height="33" fill="none" stroke="#000" stroke-width="0.35"/>
		<text x="159" y="110" font-size="3" text-anchor="middle">UTERUM</text>
		<text x="159" y="114.5" font-size="2.5" text-anchor="middle" fill="#444">17 m² · balkong ovanpå</text>

		<!-- Innerväggar huvudkropp -->
		<g stroke="#000" stroke-width="1.2">
			<line x1="92" y1="0" x2="92" y2="35"/>          <!-- kontor | kök -->
			<line x1="72" y1="35" x2="132" y2="35"/>        <!-- norra rummen | södra -->
			<line x1="92" y1="35" x2="92" y2="90"/>         <!-- klädvård | hall -->
			<line x1="92" y1="55" x2="72" y2="55"/>         <!-- klädvård | wc -->
			<line x1="112" y1="35" x2="112" y2="90"/>       <!-- hall | vardagsrum -->
			<line x1="132" y1="0" x2="132" y2="35"/>        <!-- kök | matplats -->
		</g>
		<!-- Trappa i hall (rakt lopp) -->
		<g stroke="#000" stroke-width="0.35">
			<rect x="103" y="38" width="9" height="30" fill="none"/>
			<line x1="103" y1="42" x2="112" y2="42"/><line x1="103" y1="46" x2="112" y2="46"/>
			<line x1="103" y1="50" x2="112" y2="50"/><line x1="103" y1="54" x2="112" y2="54"/>
			<line x1="103" y1="58" x2="112" y2="58"/><line x1="103" y1="62" x2="112" y2="62"/>
			<path d="M 107.5 66 L 107.5 40 M 107.5 40 L 106 43 M 107.5 40 L 109 43" stroke-width="0.25"/>
		</g>

		<!-- Öppningar (vita gap) + dörrar -->
		<g>
			<!-- entrédörr söder x 116..128 -->
			<rect x="116" y="88" width="12" height="4" fill="#fff"/>
			<path d="M 116 90 A 12 12 0 0 1 128 78" fill="none" stroke="#000" stroke-width="0.25"/>
			<line x1="116" y1="90" x2="116" y2="78" stroke="#000" stroke-width="0.5"/>
			<!-- dörr vardagsrum → uterum -->
			<rect x="150" y="88" width="10" height="4" fill="#fff"/>
			<!-- dörr klädvård → garage (västvägg huvudkropp) -->
			<rect x="70" y="60" width="4" height="9" fill="#fff"/>
			<!-- garageportar söder (2 st 2,5 m) -->
			<rect x="8" y="79" width="25" height="4" fill="#fff"/>
			<rect x="39" y="79" width="25" height="4" fill="#fff"/>
			<line x1="8" y1="81" x2="33" y2="81" stroke="#000" stroke-width="0.8" stroke-dasharray="3 1.5"/>
			<line x1="39" y1="81" x2="64" y2="81" stroke="#000" stroke-width="0.8" stroke-dasharray="3 1.5"/>
		</g>

		<!-- Trappa till lägenheten (i garagets NÖ hörn) -->
		<g stroke="#000" stroke-width="0.35">
			<rect x="62" y="17" width="9" height="26" fill="none"/>
			<line x1="62" y1="21" x2="71" y2="21"/><line x1="62" y1="25" x2="71" y2="25"/>
			<line x1="62" y1="29" x2="71" y2="29"/><line x1="62" y1="33" x2="71" y2="33"/>
			<line x1="62" y1="37" x2="71" y2="37"/>
			<text x="66.5" y="48" font-size="2.2" text-anchor="middle">trappa lgh</text>
		</g>

		<!-- Rumsnamn -->
		<g font-size="3">
			<text x="82" y="18" text-anchor="middle">KONTOR</text><text x="82" y="22.5" text-anchor="middle" font-size="2.5" fill="#444">7 m²</text>
			<text x="112" y="18" text-anchor="middle">KÖK</text><text x="112" y="22.5" text-anchor="middle" font-size="2.5" fill="#444">13 m²</text>
			<text x="162" y="18" text-anchor="middle">MATPLATS</text><text x="162" y="22.5" text-anchor="middle" font-size="2.5" fill="#444">14 m²</text>
			<text x="82" y="47" text-anchor="middle">WC/D</text>
			<text x="82" y="74" text-anchor="middle">KLÄDVÅRD</text><text x="82" y="78.5" text-anchor="middle" font-size="2.5" fill="#444">groventré</text>
			<text x="100" y="80" text-anchor="middle">HALL</text><text x="100" y="84.5" text-anchor="middle" font-size="2.5" fill="#444">öppet till nock</text>
			<text x="152" y="60" text-anchor="middle">VARDAGSRUM</text><text x="152" y="64.5" text-anchor="middle" font-size="2.5" fill="#444">28 m²</text>
			<text x="36" y="47" text-anchor="middle">GARAGE</text><text x="36" y="51.5" text-anchor="middle" font-size="2.5" fill="#444">2 bilar · 40 m²</text>
		</g>

		<!-- Snittmarkering A–A (genom entré/trappa, nord–syd) -->
		<g stroke="#000" stroke-width="0.8">
			<line x1="107" y1="-8" x2="107" y2="-2" stroke-dasharray="4 1.5 1 1.5"/>
			<line x1="107" y1="92" x2="107" y2="98" stroke-dasharray="4 1.5 1 1.5"/>
			<circle cx="107" cy="-11" r="3" fill="none" stroke-width="0.35"/>
			<circle cx="107" cy="101" r="3" fill="none" stroke-width="0.35"/>
			<text x="107" y="-9.9" font-size="3" text-anchor="middle">A</text>
			<text x="107" y="102.1" font-size="3" text-anchor="middle">A</text>
		</g>

		<!-- Huvudmått (meter, 1 decimal) -->
		<g font-size="2.8" stroke-width="0.13">
			<line x1="0" y1="135" x2="192" y2="135" stroke="#000"/>
			<line x1="0" y1="133" x2="0" y2="137" stroke="#000"/><line x1="72" y1="133" x2="72" y2="137" stroke="#000"/><line x1="192" y1="133" x2="192" y2="137" stroke="#000"/>
			<text x="36" y="133.8" text-anchor="middle">7,2</text>
			<text x="132" y="133.8" text-anchor="middle">12,0</text>
			<line x1="200" y1="0" x2="200" y2="90" stroke="#000"/>
			<line x1="198" y1="0" x2="202" y2="0" stroke="#000"/><line x1="198" y1="90" x2="202" y2="90" stroke="#000"/>
			<text x="203" y="46" font-size="2.8">9,0</text>
		</g>
	</g>

	<!-- Skalstock 1:100 -->
	<g transform="translate(20,278)">
		<rect x="0" y="0" width="10" height="2" fill="#000"/><rect x="10" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="20" y="0" width="10" height="2" fill="#000"/><rect x="30" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="40" y="0" width="10" height="2" fill="#000"/>
		<text x="0" y="-1.2" font-size="2.5" text-anchor="middle">0</text><text x="50" y="-1.2" font-size="2.5" text-anchor="middle">5 m</text>
	</g>
</svg>
