<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 297" font-family="Arial, Helvetica, sans-serif">
	<rect width="420" height="297" fill="#ffffff"/>
	<rect x="10" y="10" width="400" height="277" fill="none" stroke="#000" stroke-width="0.35"/>
	<text x="20" y="22" font-size="5" font-weight="bold">PLAN — ÖVERVÅNING</text>
	<text x="20" y="28" font-size="3" fill="#666">SKISS V0 — EJ BYGGLOVSHANDLING · Skanör-inspirerad · skala 1:100 (A3)</text>
	<text x="405" y="285" font-size="2.5" text-anchor="end">Husbygget · 2026-07-18 · skiss av Claude</text>

	<g transform="translate(395,35)">
		<circle r="7" fill="none" stroke="#000" stroke-width="0.25"/>
		<path d="M 0 5 L 0 -5 M 0 -5 L -2 -1.5 M 0 -5 L 2 -1.5" stroke="#000" stroke-width="0.5" fill="none"/>
		<text y="-9.5" text-anchor="middle" font-size="3">N</text>
	</g>

	<!-- ==== GEOMETRI: 1 m = 10 mm. Norr = upp. ==== -->
	<g transform="translate(60,45)">
		<!-- Huvudkropp -->
		<rect x="72" y="0" width="120" height="90" fill="none" stroke="#000" stroke-width="4"/>
		<!-- Garagelänga (lägenheten) -->
		<rect x="0" y="15" width="72" height="66" fill="none" stroke="#000" stroke-width="4"/>
		<!-- Balkong (uterummets tak) med räcke -->
		<rect x="135" y="90" width="48" height="36" fill="none" stroke="#000" stroke-width="0.8"/>
		<g stroke="#000" stroke-width="0.25">
			<line x1="135" y1="93" x2="183" y2="93"/><line x1="138" y1="90" x2="138" y2="126"/>
			<line x1="135" y1="123" x2="183" y2="123"/><line x1="180" y1="90" x2="180" y2="126"/>
		</g>
		<text x="159" y="108" font-size="3" text-anchor="middle">BALKONG</text>
		<text x="159" y="112.5" text-anchor="middle" font-size="2.5" fill="#444">räcke 1,1 m · 17 m²</text>

		<!-- Innerväggar huvudkropp -->
		<g stroke="#000" stroke-width="1.2">
			<line x1="72" y1="32" x2="192" y2="32"/>        <!-- norra sovrumsraden | södra -->
			<line x1="112" y1="0" x2="112" y2="32"/>        <!-- sovrum 2 | sovrum 3 -->
			<line x1="152" y1="0" x2="152" y2="32"/>        <!-- sovrum 3 | bad -->
			<line x1="112" y1="32" x2="112" y2="90"/>       <!-- öppet ned | allrum -->
			<line x1="132" y1="32" x2="132" y2="90"/>       <!-- allrum | master -->
			<line x1="132" y1="55" x2="112" y2="55"/>       <!-- klk -->
		</g>

		<!-- Trappa upp (samma läge som bv) + öppet ned över entrén -->
		<g stroke="#000" stroke-width="0.35">
			<rect x="103" y="38" width="9" height="30" fill="none"/>
			<line x1="103" y1="44" x2="112" y2="44"/><line x1="103" y1="50" x2="112" y2="50"/>
			<line x1="103" y1="56" x2="112" y2="56"/><line x1="103" y1="62" x2="112" y2="62"/>
		</g>
		<g font-size="2.5" fill="#444">
			<text x="92" y="76" text-anchor="middle">ÖPPET NED</text>
			<text x="92" y="80" text-anchor="middle">(entré)</text>
		</g>
		<line x1="72" y1="32" x2="112" y2="90" stroke="#000" stroke-width="0.25" stroke-dasharray="2 1.5"/>

		<!-- Skjutparti master → balkong (öppning i södervägg) -->
		<rect x="142" y="88" width="35" height="4" fill="#fff"/>
		<g stroke="#000" stroke-width="0.8">
			<line x1="142" y1="89" x2="161" y2="89"/>
			<line x1="158" y1="91" x2="177" y2="91"/>
		</g>
		<text x="159" y="86" font-size="2.2" text-anchor="middle" fill="#444">skjutparti 3,5 m</text>

		<!-- Lägenhetens rum -->
		<g stroke="#000" stroke-width="1.2">
			<line x1="45" y1="15" x2="45" y2="48"/>
			<line x1="45" y1="48" x2="72" y2="48"/>
		</g>
		<g font-size="3">
			<text x="24" y="45" text-anchor="middle">ALLRUM + PENTRY</text>
			<text x="24" y="49.5" text-anchor="middle" font-size="2.5" fill="#444">lägenhet · 20 m²</text>
			<text x="58" y="30" text-anchor="middle">SOVRUM</text>
			<text x="58" y="66" text-anchor="middle">BAD</text>
		</g>
		<!-- Lägenhetens interndörr → huvudhus -->
		<rect x="70" y="55" width="4" height="9" fill="#fff"/>
		<text x="76" y="52" font-size="2.2" fill="#444">dörr till huvudhus</text>

		<!-- Rumsnamn huvudkropp -->
		<g font-size="3">
			<text x="92" y="15" text-anchor="middle">SOVRUM 2</text><text x="92" y="19.5" text-anchor="middle" font-size="2.5" fill="#444">11 m²</text>
			<text x="132" y="15" text-anchor="middle">SOVRUM 3</text><text x="132" y="19.5" text-anchor="middle" font-size="2.5" fill="#444">11 m²</text>
			<text x="172" y="15" text-anchor="middle">BAD</text><text x="172" y="19.5" text-anchor="middle" font-size="2.5" fill="#444">badkar</text>
			<text x="122" y="60" text-anchor="middle" transform="rotate(90 122 60)">KLK</text>
			<text x="97" y="45" text-anchor="middle">ALLRUM</text>
			<text x="162" y="55" text-anchor="middle">MASTER BEDROOM</text><text x="162" y="59.5" text-anchor="middle" font-size="2.5" fill="#444">17 m² · skjutdörrar mot balkong</text>
		</g>

		<!-- Snitt A–A -->
		<g stroke="#000" stroke-width="0.8">
			<line x1="107" y1="-8" x2="107" y2="-2" stroke-dasharray="4 1.5 1 1.5"/>
			<line x1="107" y1="92" x2="107" y2="98" stroke-dasharray="4 1.5 1 1.5"/>
			<circle cx="107" cy="-11" r="3" fill="none" stroke-width="0.35"/>
			<circle cx="107" cy="101" r="3" fill="none" stroke-width="0.35"/>
			<text x="107" y="-9.9" font-size="3" text-anchor="middle">A</text>
			<text x="107" y="102.1" font-size="3" text-anchor="middle">A</text>
		</g>
	</g>

	<!-- Skalstock 1:100 -->
	<g transform="translate(20,278)">
		<rect x="0" y="0" width="10" height="2" fill="#000"/><rect x="10" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="20" y="0" width="10" height="2" fill="#000"/><rect x="30" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="40" y="0" width="10" height="2" fill="#000"/>
		<text x="0" y="-1.2" font-size="2.5" text-anchor="middle">0</text><text x="50" y="-1.2" font-size="2.5" text-anchor="middle">5 m</text>
	</g>
</svg>
