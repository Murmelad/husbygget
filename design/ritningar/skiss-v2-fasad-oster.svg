<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 297" font-family="Arial, Helvetica, sans-serif">
	<rect width="420" height="297" fill="#ffffff"/>
	<rect x="10" y="10" width="400" height="277" fill="none" stroke="#000" stroke-width="0.35"/>
	<text x="20" y="22" font-size="5" font-weight="bold">FASAD MOT ÖSTER (entréfasad)</text>
	<text x="20" y="28" font-size="3" fill="#666">SKISS V2 — EJ BYGGLOVSHANDLING · 1,5-plan, garaget i samma kropp · norr åt HÖGER · skala 1:100 (A3)</text>
	<text x="405" y="285" font-size="2.5" text-anchor="end">Husbygget · 2026-07-18 · skiss av Claude</text>

	<!-- ==== GEOMETRI: 1 m = 10 mm. Sedd österifrån: NORR åt höger, söder åt vänster. Mark y=210. ==== -->
	<g transform="translate(75,0)">
		<!-- Marklinjer -->
		<line x1="-20" y1="210" x2="250" y2="210" stroke="#000" stroke-width="0.8"/>
		<line x1="-20" y1="212" x2="250" y2="212" stroke="#000" stroke-width="0.35" stroke-dasharray="3 2"/>

		<!-- EN SAMMANHÅLLEN KROPP 19,0 m (garaget = förlängning, samma takfot/nock):
		     x 36..226 · takfot 4,4 (y166) · nock 7,6 (y134) · taklutning 38° -->
		<rect x="36" y="166" width="190" height="44" fill="none" stroke="#000" stroke-width="0.5"/>
		<line x1="33" y1="166" x2="229" y2="166" stroke="#000" stroke-width="0.5"/>
		<line x1="41" y1="134" x2="221" y2="134" stroke="#000" stroke-width="0.35"/>
		<line x1="33" y1="166" x2="41" y2="134" stroke="#000" stroke-width="0.35"/>
		<line x1="229" y1="166" x2="221" y2="134" stroke="#000" stroke-width="0.35"/>

		<!-- Takfönster (dash-dot på takfallet) -->
		<g stroke="#000" stroke-width="0.35" stroke-dasharray="3 1.5 0.8 1.5" fill="none">
			<rect x="90" y="146" width="10" height="12"/>
			<rect x="130" y="146" width="10" height="12"/>
		</g>

		<!-- Entrédörr + skärmtak (14,0-huset: dörr ~6,2 m från södra gaveln) -->
		<rect x="98" y="189" width="12" height="21" fill="none" stroke="#000" stroke-width="0.35"/>
		<line x1="95" y1="187" x2="113" y2="187" stroke="#000" stroke-width="0.8"/>

		<!-- Fönster bv (vardagsrum söder om entrén, kök/tvätt norr om) -->
		<rect x="48" y="186" width="16" height="16" fill="none" stroke="#000" stroke-width="0.35"/>
		<line x1="56" y1="186" x2="56" y2="202" stroke="#000" stroke-width="0.18"/>
		<rect x="72" y="186" width="12" height="16" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="120" y="188" width="12" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="142" y="188" width="12" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="162" y="188" width="10" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<!-- Garagedelens fönster (bv + lägenhetens i väggliv) -->
		<rect x="186" y="188" width="10" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="206" y="188" width="10" height="12" fill="none" stroke="#000" stroke-width="0.35"/>
		<rect x="196" y="170" width="10" height="9" fill="none" stroke="#000" stroke-width="0.35"/>

		<!-- UTERUM på SÖDRA gaveln (vänster): 3,6 m djupt, balkong med räcke ovanpå -->
		<rect x="0" y="183" width="36" height="27" fill="none" stroke="#000" stroke-width="0.5"/>
		<g stroke="#000" stroke-width="0.18">
			<line x1="12" y1="183" x2="12" y2="210"/><line x1="24" y1="183" x2="24" y2="210"/>
			<line x1="0" y1="196" x2="36" y2="196"/>
		</g>
		<line x1="-2" y1="183" x2="38" y2="183" stroke="#000" stroke-width="0.8"/>
		<g stroke="#000" stroke-width="0.25">
			<line x1="0" y1="172" x2="36" y2="172" stroke-width="0.5"/>
			<line x1="2" y1="172" x2="2" y2="183"/><line x1="7" y1="172" x2="7" y2="183"/><line x1="12" y1="172" x2="12" y2="183"/>
			<line x1="17" y1="172" x2="17" y2="183"/><line x1="22" y1="172" x2="22" y2="183"/><line x1="27" y1="172" x2="27" y2="183"/>
			<line x1="32" y1="172" x2="32" y2="183"/>
		</g>
		<text x="18" y="216" font-size="2.2" text-anchor="middle" fill="#444">uterum · balkong ovanpå (söder)</text>

		<!-- Höjdmått -->
		<g font-size="2.8" stroke-width="0.13">
			<line x1="240" y1="134" x2="240" y2="210" stroke="#000"/>
			<line x1="238" y1="134" x2="242" y2="134" stroke="#000"/>
			<line x1="238" y1="166" x2="242" y2="166" stroke="#000"/>
			<line x1="238" y1="210" x2="242" y2="210" stroke="#000"/>
			<text x="244" y="135" font-size="2.8">nock +7,6</text>
			<text x="244" y="167" font-size="2.8">takfot +4,4</text>
			<text x="244" y="209" font-size="2.8">mark ±0</text>
			<text x="130" y="222" font-size="2.5" fill="#444" text-anchor="middle">taklutning 38° · 1,5-plan · garaget i norra änden (höger) · material/kulör TBD</text>
		</g>
	</g>

	<!-- Skalstock 1:100 -->
	<g transform="translate(20,278)">
		<rect x="0" y="0" width="10" height="2" fill="#000"/><rect x="10" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="20" y="0" width="10" height="2" fill="#000"/><rect x="30" y="0" width="10" height="2" fill="none" stroke="#000" stroke-width="0.18"/>
		<rect x="40" y="0" width="10" height="2" fill="#000"/>
		<text x="0" y="-1.2" font-size="2.5" text-anchor="middle">0</text><text x="50" y="-1.2" font-size="2.5" text-anchor="middle">5 m</text>
	</g>
</svg>
